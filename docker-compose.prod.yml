services:
  api:
    container_name: kali-auth-api-prod
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    env_file:
      - .env.prod
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always
    cpus: 1.0
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "/bin/busybox", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kali-auth-prod-net

  db:
    container_name: kali-auth-db-prod
    image: postgres:16-alpine
    env_file:
      - .env.prod
    volumes:
      - db_data_prod:/var/lib/postgresql/data
      - ./scripts/pg-healthcheck.sh:/app/scripts/pg-healthcheck.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "/app/scripts/pg-healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    cpus: 1.0
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kali-auth-prod-net

  rabbitmq:
    container_name: kali-auth-rabbitmq-prod
    image: rabbitmq:3.13-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    cpus: 0.5
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kali-auth-prod-net

networks:
  kali-auth-prod-net:
    name: kali-auth-prod-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  db_data_prod:
